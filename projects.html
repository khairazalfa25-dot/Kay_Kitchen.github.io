       const projectsData = [
           {
    title: "L'Oreal Brandstorm Hackathon 2026",
    tags: "Sustainable Product Design / Fragrance Innovation",
    desc: "Co-engineered a sustainable fragrance experience concept and pitched business viability blueprints.",
    details: `
        <h3>Main Goal</h3>
        <p>Our mission was to create a next-generation fragrance experience that bridged creativity, tech, and sustainability which can in turn, redefine how consumers can connect with luxury tech.</p>
        
        <h3>Ideation</h3>
        <p>Before jumping straight into innovating, we firstly needed to figure out what exactly was an on-going issue in fragrance. Through research, we learned it was personalization. Gen Z is rapidly becoming the core driver of the luxury market, and if there is one thing my generation demands, it's a way to truly express our authentic identity. We wanted to create a product that kept its high-end luxury feel and sustainable design, but doubled as a fluid outlet for self-expression.</p>
        <p>But we didn't want to lock older generations out of the experience either! To bridge the gap between Gen Z's love for custom vibes and the broader market, we hit on our best idea: anchoring our entire fragrance story around "Life Stages."</p>
        
        <h3>Product</h3>
        <p>We wanted to specifically highlight “Life Stages” as it is an experience every person shares, no matter the background. Hence the following stages: <em>Becoming, Desire, Loss, Journey, Wisdom</em>; became the core of our collection. Each stage is paired with a specific base note, reflecting the scent of where you’re at in your life. This is where personalization comes to play: these base notes will be paired with top & middle notes of the consumer’s preferred scent. As an added tribute to the theme, we chose the bottle itself to look like an hourglass with the base note and top/middle note bottles stacked into one perfume! So when you snap the two pieces together, it literally forms a physical hourglass that holds your entire custom scent profile.</p>
        
        <img src="Images/LOREAL BRANDSTORM (2).png" class="project-media-img" alt="L'Oreal Life Code Fragrance Product Design">

        <h3>Experience</h3>
        <p>To make the whole collection come to life, we designed an in-store retail experience too! Inside the store, consumers begin with an interactive questionnaire booth to assist them in finding their identity in the form of a perfume. Once their unique stage and personalized scent notes are selected, further customization can be applied by choosing cute decorative charms to hang on their fragrance bottles!</p>
        
        <img src="Images/2.png" class="project-media-img" alt="In-Store Retail Ritual Experience Concept">

        <h3>Packaging Sustainability & Costs</h3>
        <p>This portion of the project was my main focus! I wanted to make sure that our product refrained from being outrageously expensive while still being kind to the Earth. Something I implemented was the <strong>forever vessel</strong> concept. Instead of people throwing away a luxury glass bottle every single time they finish a fragrance, the main hourglass structure acts as a permanent keepsake. Then once the perfume inside runs out, customers could simply buy refillables. This builds emotional attachment to the bottle all while massively cutting down on glass waste!</p>
        <p>From there, I focused on sourcing materials for the rest of the assembly that were sustainable but wouldn't break the bank. For the outer frame, I chose <em>Arboform</em> (a type of "liquid wood"), and for the outer packaging, I went with a molded pulp made from sugarcane waste that easily snaps shut. To give the judges a clear breakdown of the economics, I put everything into this cost-structure table:</p>
        
        <img src="Images/LOREAL TABLE.png" class="project-media-img" alt="L'Oreal Life Code Cost Structure Table">
        
        <h3>Takeaways</h3>
        <p>Though we didn’t win, it was still so fun designing this product with my besties. This hackathon taught me a lot about the fragrance industry too! From the deep chemistry and sustainability science behind it, to the actual costs, material sourcing, and luxury marketing. It was a wild ride, but seeing our engineered concept come together was the ultimate reward! (Also biggest shout out to my friends, couldn't have done it without them :D)</p>
    `
},
            {
                title: "Garena x NTU Roblox Game Development",
                tags: "Game Programming / Systems Architecture / Luau",
                desc: "Co-developed a mobile-optimized survival horror game from scratch and won Representatives' Choice.",
                details: `
                    <h3>Main Idea</h3>
                    <p>As a long-time gamer on Roblox, I gasped at the sight of a Roblox game development competition and knew I had to join. After assembling our squad of 4, one of my teammates already had an idea inspired by a TikToker whose job was packing up bread orders in a warehouse. We then set off to develop a silly horror game where players are tasked to pack bread orders while surviving through the random creepy events for the next 4 nights.</p>
                    
                    <h3>Task Management</h3>
                    <p>To actually develop the game, we each assigned everyone a specific area to work on. My friends handled the bread pick up system, lobby design, the monster, shelf layout randomizers, and more! Meanwhile, I stepped up as the <strong>Lead Gameplay & Systems Programmer</strong>, focusing on the core mechanics that shaped the player's survival experience, environmental atmosphere, and game flow.</p>
                    <p>Specifically, I engineered and scripted:</p>
                    <ul>
                        <li><strong>Player Survival Mechanics:</strong> Coded a custom sprinting system with an accompanying stamina and health bar system to give players a fighting chance to run away when things went south.</li>
                        <li><strong>The Economy & Survival Shop:</strong> Scripted a functional money system tied to a fully working in-game vending machine where players could buy utility items to help fight off the monsters.</li>
                        <li><strong>Game Flow & Cinematic Transitions:</strong> Managed the progression of the storyline by scripting smooth UI transitions between the 4 nights to build suspense.</li>
                        <li><strong>Immersive Atmosphere:</strong> Set up the monster's spooky animations, decorated the main warehouse area to look appropriately creepy, and implemented an interactive walkie-talkie voice system that guides (and terrifies) the player throughout the night!</li>
                    </ul>
                    
                    <h3>Flavoring & Branding</h3>
                    <p>To add to the fun of innovating, we even designed our booth to be interactive with fun giant posters and holdable pieces of bread!</p>
                    
                    <img src="Images/roblox-booth.jpg" class="project-media-img" alt="Garena Roblox Game Assets and Packaging Design">

                    <h3>Challenges</h3>
                    <p>This was actually the first time I had ever worked with Luau or any game developing code so I was already quite intimidated. Despite the fear, I found that learning code was actually a lot of fun for the most part! However, there was one specific part of the game that took us almost a month to solve: Making sure it’s mobile friendly.</p>
                    <p>Most of the team played on their laptops but being the iPad kid that I am, I decided to try playing on mobile. This became both a blessing and a curse. For some reason, nothing worked on mobile. The UIs were not centered or just unproportionally sized, the pick up system didn’t work either, and worst of all I couldn’t move the screen.</p>
                    <p>Being the only mobile user, I took it upon myself to solve these issues. Initially it wasn’t too bad; the UI and pick up system problems were an easy fix! Mostly just resizing and adding physical buttons. The screen issue was a different story though. After weeks of tirelessly checking each UI layer, analyzing the mobile camera system, and even looking for potential bugs or viruses; I decided to officially stand back and have my friend look at the problem.</p>
                    <p>Thankfully, a new set of eyes was exactly what I needed. She dug into the repository and found a lingering line of code from an old script that was accidentally locking the camera script entirely on mobile devices. Having her fresh perspective fix a month-long headache taught me a massive lesson: you don't have to burden yourself with fixing everything alone!</p>
                    
                    <h3>Key Takeaways</h3>
                    <p>Three months and about 500 troubleshooting sessions later, we were awarded <strong>Representatives’ Choice!</strong> To be completely honest, the game itself still has quite a few bugs. However, considering we were only given three months to build everything from scratch <em>and</em> half the team (including me) had never coded a game before, we are beyond proud of what we accomplished! This competition completely proved that diving headfirst into an unfamiliar coding language with an amazing squad can lead to the most rewarding outcomes. ALSO, the game is unfortunately privated by Garena but here's a cute pic of the squad! :D</p>
                    <img src="Images/roblox.jpg" class="project-media-img" alt="Winning Representatives' Choice at Garena x NTU Competition">
                `
            },
          {
                title: "Healthcare Data Analysis",
                tags: "Python / Data Wrangling / Machine Learning",
                desc: "Cleaned a chaotic clinical dataset and trained a Logistic Regression 'detective' model to evaluate patient readmission trends.",
                details: `
                    <h3>Main Task!</h3>
                    <p>This mini project was a graded group assignment from my 'Intro to Data Science and AI' class! After being paired up, we were tasked to evaluate a massive clinical healthcare tracking dataset. The core objective? Figuring out if a patient’s demographic attributes and hospital stay parameters could serve as reliable mathematical predictors for hospital readmission!</p>
                    
                    <h3>Data Clean Up</h3>
                    <p>Before doing any cool modeling, we had to deal with a dataset that was an absolute chaotic mess. I took the reins and prepared the data by loading them up using <strong>Pandas</strong>. However, I immediately hit a wall: missing values weren't clean spaces, they were filled with literal question marks (<code>?</code>). Hence, to fix the mess, I had to run a replacement pipeline to convert those anomalies into clean <code>NaN</code> values and assess the target column statistics.</p>
                    <p>Worse yet, variables like 'age' were stored as string brackets (like <code>[0-10)</code> or <code>[10-20)</code>) which Python completely choked on. I mapped out a manual structural dictionary (e.g., mapping <code>[0-10)</code> to an absolute numerical integer of 5) to force the data into strict mathematical integers that a machine learning architecture could actually process.</p>
                    
                    <h3>Visualizations</h3>
                    <p>Once the dataset was clean, my teammate and I decided to divide the work so that we could both deeply learn different aspects of the data science workflow! He took over the purely biological data variables, while I took complete ownership of the <strong>Lifestyle & Administrative</strong> features (such as age, hospital stay duration, and historical outpatient or emergency visit metrics).</p>
                    <p>For my exploratory lifestyle data analysis, I used <strong>Matplotlib</strong> and <strong>Seaborn</strong> to start hunting for correlation clues:</p>
                    <ul>
                        <li><strong>The Weak Clue:</strong> I plotted a boxplot of <em>Patient Age</em> against <em>Readmission Status</em>. The result? The boxes looked almost completely identical, revealing that age alone was a surprisingly weak, standalone predictor.</li>
                        <li><strong>The Strong Clue:</strong> I pivoted and plotted a second boxplot checking <em>Days Spent in Hospital</em>. This gave me a much stronger statistical signal, showing a clearer upward variance in hospital stay durations for patients who were eventually readmitted.</li>
                    </ul>
                    
                    <h3>Coming Together & Training the Model</h3>
                    <p>After analyzing our respective data domains individually, we came back together to merge our findings and push our combined feature sets into the machine learning stage. Because predicting readmission is a binary "Yes/No" problem, we selected <strong>Logistic Regression</strong> and <strong>Decision Tree</strong> classification frameworks to see which algorithm would handle our multi-layered health metrics better.</p>
                    <p>My primary focus was building out our baseline pipeline: separating the clinical clues from the target answer key, converting the final data structures to clean numerical types, and splitting the dataset into an 80/20 train-test ratio via <strong>Scikit-Learn</strong>. I deployed the Logistic Regression framework, which I affectionately crowned my <em>'Lifestyle Detective'</em> in the notebook script. Meanwhile, we cross-examined its performance metrics against the Decision Tree classifier to look for signs of structural overfitting.</p>
                    <p>After letting the AI study the data and running it through its final test exam, my 'Lifestyle Detective' classification model successfully clocked in a <strong>61.24% accuracy score</strong> in predicting hospital readmission trends strictly from fundamental lifestyle and administrative metrics.</p>
                    
                    <h3>Takeaways</h3>
                    <p>So in the end, our final data analysis revealed that <strong>a patient’s historical hospital stay record is a vastly stronger warning sign for readmission than their clinical biological data!</strong> While the Decision Tree model proved highly effective at isolating those high-risk individuals, the overall takeaway completely reshaped how we look at healthcare data. We realized that to actively cut down on readmission rates, medical staff must look far beyond blood test results and prioritize strategic discharge plans for patients with a clear history of frequent hospital visits.</p>
                    <p>Looking back, I was honestly terrified of this project at first because of the sheer amount of coding, but diving into the data turned out to be such an eye-opening experience and ended up being a blast! :3</p>
                `
            },
           {
                title: "OatLab: Craft Oat Milk Experiment",
                tags: "Food Science / Product Branding",
                desc: "Explored food chemistry mechanics to engineer a non-slimy, artisanal oat milk line with nostalgic flavors.",
                details: `
                    <h3>OatLab Origin Story</h3>
                    <p>Since it was winter break, I wanted to conduct a little passion project experiment inspired by my love for oat milk! However, I didn’t want to just simply make my own oat milk; I wanted to actually learn the food science behind industrial milk alternatives while experimenting with unique flavor profiles in my own kitchen! Hence, OatLab was born!</p>
                    
                    <h3>The Science!</h3>
                    <p>Before jumping in, I decided to firstly understand what oat milk is. I’m sure anyone who has tried blending oats at home knows the biggest enemy is the texture. I learned the struggle with oat milk is that as soon as the oats hit water, they release starches that turn incredibly slimy.</p>
                    <p>To figure out how industrial brands get it so smooth, I did some digging into the chemical mechanics of food science. That’s when I learned about enzymatic breakdown. To fix the slime issue in my own kitchen, I sourced <strong>alpha-amylase enzyme powder</strong> to use during the heating phase. The enzyme acts like molecular scissors, chopping up those long-chain oat starches into simple sugars. Not only did this completely defeat the slimy texture, but it also gave the milk a perfectly smooth consistency and a natural, subtle sweetness without adding extra sugar!</p>
                    <p>Once I got the texture perfectly smooth, I thought it was the end of my learning. Turns out, over time, my oat milk started to separate and curdle. Personally, it wasn’t a big deal to me since shaking or reblending brought back its texture, however I wanted to further research why this was happening. Interestingly, oat proteins are incredibly sensitive to heat and acidity, which is why homemade oat milk notoriously curdles if you drop it into a hot cup of coffee. In my case, adding my custom banana syrup had introduced just enough acidity to slowly destabilize the mixture. Because it takes time for the uncharged protein molecules to passively drift, collide, and stick together, the curdling only showed up after it sat for a while.</p>
                    
                    <h3>Flavoring</h3>
                    <p>Now the innovation part! I have quite a soft spot for nostalgic flavors so I landed on pandan, banana bread, and cookies & cream. To add the fun of innovating, I even created little packaging mockups for each flavor!</p>
                    
                    <img src="Images/banana-bread.png" class="project-media-img" alt="banana">
                    <img src="Images/pandan.png" class="project-media-img" alt="pandan">
                    <img src="Images/cookies&cream.png" class="project-media-img" alt="cookies">

                    <p>For the actual flavoring process, pandan and cookies & cream were the easy ones! Pandan flavoring was something I already had on hand whereas cookies & cream simply used vanilla extract and chocolate cookies. Banana bread however was tougher to crack. I decided to make a banana syrup using brown butter, mashed bananas, and brown sugar though it didn’t exactly go as planned (Note to self: do not put real butter in a refrigerated drink). Because butter is fat, it completely separated from the liquid base. Once I put the oat milk in the fridge, the temperature dropped, causing the floating oils to separate and literally freeze into solid little chunks of butter floating at the top.</p>
                    <p>After doing some panic-research, I found out that people use <strong>Xanthan Gum</strong> and <strong>Gum Arabic</strong> to pull this off. Basically, Gum Arabic acts as an emulsifier where one side loves water and the other loves fat, so it forces the oil and water to bond together. Xanthan Gum then thickens the liquid to physically trap the fat droplets so they can't float to the top and solidify. Now with that said, you may think I tried getting my hands on these emulsifiers but…. By then, I had to end my experiment due to the end of winter break (Tragic, I know).</p>
                    
                    <h3>Final Takeaways</h3>
                    <p>Although my experiment ended on a not-so-great note, I did gain a lot of knowledge on food science which was my initial goal in the first place! However, I did make a mental note to tweak the banana syrup and am continuously seeking a new recipe (I’m trying all purpose cream next). Winter break might have ended, but my quest for the ultimate, non-slimy, butter-chunk-free banana bread flavored oat milk is far from over. ✨</p>
                `
            },
             {
                title: "FreeCAD & Autodesk Toilet Project",
                tags: "CAD / Parametric Modeling / Rapid Prototyping",
                desc: "Designing and iterating a material-efficient 3D-printed funnel mechanism to solve a household flapper alignment failure.",
                details: `
                    <h3>Problem</h3>
                    <p>I spent most of my summer break experimenting with new things (like building this website hehe), so when the family toilet started acting up, the idea of another project immediately came to mind. Truth is, this specific toilet always had trouble flushing for several years. Which is why I took it upon myself to figure out what’s wrong and actually try proposing a solution!</p>
                    <p>Through observation, I hypothesize that the issue is due to the flapper! As far as I observed, it looked like there was nothing particularly wrong with the fluid mechanics of the tank. Instead, it seemed like a misalignment problem with the flapper. Basically, every so often after flushing, the flapper would fail to land on top of the valve properly. This caused water to leak continuously through the valve, preventing the tank from ever filling up.</p>
                    
                    <h3>Ideation</h3>
                    <p>With the problem assessed, it was time to go to the drawing board! I thought if I created a wall-like ring that clips onto the outer part of the valve, it could possibly help guide the flapper to the perfect closing position. To do this, I came up with two designs:</p>
                    <ul>
                        <li>A straight, C-shaped wall that hugs the valve</li>
                        <li>A funnel-like, C-shaped wall, also hugging the valve</li>
                    </ul>
                    
                    <h3>Designing</h3>
                    <p>I may have the idea sketched out, but to really make the proposal come to life, I wanted to learn how to actually design it in an industry-standard environment. Initially, I drafted a quick 3D model in FreeCAD, but right before I could head to the 3D printers, my dad stepped in and fixed the physical toilet himself (Tragic part 2).</p>
                    
                    <img src="Images/Toilet Project-Straight.png" class="project-media-img" alt="straight">
                    <img src="Images/Toilet Project-Funnel.png" class="project-media-img" alt="funnel">
                   
                    <p>With the plumbing emergency solved but my engineering curiosity fully sparked, I decided to pivot. Instead of letting the design collect digital dust, I used the opportunity to upgrade my skill set and transition the project into Autodesk. However, instead of using the same two design ideas, I wanted to include one more design that would use up less material. So instead of a full wall, it would be three identical sticks in a funnel shape and are connected by the same C-shaped ring.</p>

                    <img src="Images/Toilet Project-Sticks.png" class="project-media-img" alt="sticks">

                    <p>Although it isn’t that big of a difference, iterating on a design to make it as lightweight and efficient as possible turned out to be a great lesson in sustainable rapid prototyping!</p>
                    
                    <h3>Key Takeaways</h3>
                    <p>Although I didn’t get to actually test out my idea, it was still a learning experience nonetheless.</p>
                    <p>First of all, I learned how household gravity-fed toilet flush systems actually work under the hood. Figuring out how fluid pressure, seals, and physical lift chains interact to create a functional cycle gave me a newfound appreciation for everyday mechanical and civil utilities.</p>
                    <p>But more importantly, this breakdown gave me a perfectly great excuse to finally dive into professional 3D modeling environments. I’ve been insanely curious about CAD software for a while now, and using this problem as a sandbox allowed me to teach myself how these design pipelines work. Shifting from a raw block layout in FreeCAD to an optimized, material-efficient geometry in Autodesk taught me that engineering isn't just about making something that works but about learning how to constantly iterate, optimize, and pick up the right digital tools to bring an idea to life! :D</p>
                `
            },
           {
                title: "Sourdough Fermentation Tracker (Still in Progress!)",
                tags: "Python / Data Augmentation / Predictive Analytics",
                desc: "Overcoming physical data bottlenecks by developing a synthetic data simulation loop to predict artisanal baking metrics.",
                details: `
                    <h3>Backstory</h3>
                    <p>From this website alone, it’s probably obvious how interested I am in all things food. However, one thing I hadn’t exactly tried was fermentation. I’ve had a few fermentation school projects throughout high school though I never truly learned the science behind it. Thus, I wanted to conduct a sourdough experiment where I will later use the data I collected to put my Python skills into use!</p>
                    
                    <h3>Main Goal</h3>
                    <p>My goal was to make artisan sourdough loaves throughout the summer and with the data, I plan on building a predictive machine learning model to optimize ingredient metrics.</p>
                    
                    <h3>Sourdough Starter Challenge</h3>
                    <p>I thought that making the sourdough starter itself would be a breeze. So, I named my starter Joe and got to work feeding him every day. Through initial research, I saw that some starters are ready to be used in a week or two but I later learned it would take a lot longer. By the end of week one, I saw little to no progress from Joe. He bubbled on day two but after that, he stayed completely flat. By the end of week two, I noticed bubbles appearing but he wasn’t doubling consistently. It would take an entire 24 hours just to double. At that point, I thought of giving up on Joe but still gave him one more week to redeem himself and thank goodness I did. In week 3, he was finally ready to be used in my first loaf!</p>
                    <p>This was an accomplishment but also a realization that my initial plan to build a machine learning model may not work. Only a few loaves would come out of this experiment meaning I wouldn’t have a large enough dataset.</p>
                    <p>This constraint did, however, give me a potential alternative idea. Why not pivot the machine learning model to focus entirely on the starter fitness itself? Since a starter's daily behavior feels completely random, I could theoretically use my daily documentation logs from those volatile first three weeks to build a classification tool that maps environmental variables (like feeding frequency or flour type) to categorize when a culture is thriving versus sluggish. This type of classification tool could be useful for novice sourdough bakers, helping them decipher whether or not their starters are ready to be baked!</p>
                    <p>But as tempting as that fallback option is, I still am quite attached with my original plan. As of now, I have only made 5 loaves, all in different conditions. Yes, it’s not ideal to have such a small set of data but I refuse to let a small dataset stop the predictive analytics tool. Instead of giving up on the pantry-ratio model, I plan to use Data Augmentation where I’ll write a Python simulation loop that uses baker's percentage rules to algorithmically "bake" hundreds of virtual loaves in a Jupyter Notebook to train my model. Joe's 5 real-life loaves along with (hopefully) 2 more will serve as my ultimate baseline anchors!</p>
                    
                    <h3>Current Takeaways</h3>
                    <p>I may not have finished the project (yet) but I've already learned a lot. As a Chemical Engineering student, it was eye-opening to see the abstract principles from my university lectures suddenly come to life right on my kitchen counter.</p>
                    <p>For starters, spending weeks managing Joe’s yeast ecosystem felt somewhat like applying my Chemical Reactions Engineering knowledge by learning how environmental thresholds, feeding kinetics, flour variations, and strict nutrient ratios directly dictate the colony's growth rate.</p>
                    <p>Then came the actual baking phase, where I literally had to deploy Heat and Mass Transfer dynamics to survive. Because I didn't have a traditional heavy dutch oven, I had to improvise an engineering workaround to trap steam. By simply placing a tray of boiling water directly underneath the baking steel, my loaf was manually regulated by the humidity and convection curves.</p>
                    <p>Now, again, I’m not done just yet as I still have a few more loaves to make and a whole machine learning model (or two) to build. It's a lot of coding to look forward to, but I'm ready to see if my virtual bakery can actually predict the perfect real-world loaf! :3</p>
                `
            },

        
        ];

        let currentIdx = 0;

        function renderCard() {
            const project = projectsData[currentIdx];
            document.getElementById("project-title").innerText = project.title;
            document.getElementById("project-tags").innerText = project.tags;
            document.getElementById("project-desc").innerText = project.desc;
        }

      function moveSlide(direction) {
            // 🚨 THE SHUFFLE TRIGGER: Plays right when an arrow is clicked!
            const shuffle = document.getElementById("shuffle-sound");
            if (shuffle) {
                shuffle.volume = 0.3
                shuffle.currentTime = 0; // Rewinds so rapid clicks still trigger it
                shuffle.play();
            }

            currentIdx += direction;
            if (currentIdx >= projectsData.length) currentIdx = 0;
            if (currentIdx < 0) currentIdx = projectsData.length - 1;
            renderCard();
        }

        function expandProject() {
            // 🚨 THE DING TRIGGER: Rings clear right when the card pops open!
            const ding = document.getElementById("ding-sound");
            if (ding) {
                ding.currentTime = 0;
                ding.play();
            }

            const project = projectsData[currentIdx];
            document.getElementById("modal-title").innerText = project.title;
            document.getElementById("modal-body").innerHTML = project.details;
            
            document.getElementById("project-modal").classList.add("modal-open");
            document.getElementById("main-content-wrapper").classList.add("blurred-bg");
            document.body.style.overflow = "hidden"; 
        }

        function closeProject() {
            document.getElementById("project-modal").classList.remove("modal-open");
            document.getElementById("main-content-wrapper").classList.remove("blurred-bg");
            document.body.style.overflow = "auto"; // Restores normal page scrolling
        }

        window.addEventListener("DOMContentLoaded", renderCard);
    </script>
</body>
</html>
