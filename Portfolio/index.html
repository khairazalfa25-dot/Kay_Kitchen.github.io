<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kay's Kitchen!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">
</head>
<body>

    <div class = "kitchen-page">

        <div class="cabinet overhead1-cabinet">
            <div class="handle1"></div>
        </div>

        <div class="cabinet overhead2-cabinet">
            <div class="handle2"></div>
        </div>

        <div class="cabinet left-cabinet">
            <div class="handle3"></div>
        </div>

        <div class="cabinet right-cabinet">
            <div class="handle4"></div>
        </div>

     <div class="cabinet lower-right-cabinet">
        <div class="counter-top"></div>
     </div>
     
     <div class="fridge-top">

        <div class="welcome-to-kay">
            <img src="images/abc magnets.png" alt="Welcome magnets">
        </div>

        <div class="home">
            <img src="Images/home.png" alt="Home magnets">
        </div>

        <div class="fridge-label"></div>

        <div class="fridge-handle1"></div>
        </div>
    
<div class="fridge-bottom">

    <div class="FAQ" onmouseenter="playDing()">
        <a href="faq.html" style="text-decoration: none; color: inherit;">
        <img src="Images/FAQ.png" alt="FAQ magnet">
        <p>FAQ</p>
        </a>
    </div>

    <div class="projects" onmouseenter="playDing()">
        <a href="projects.html" style="text-decoration: none; color: inherit;">
        <img src="Images/projects.png" alt="Projects magnet">
        <p>Projects</p>
        </a>
    </div>

    <div class="me" onmouseenter="playDing()">
        <a href="about.html" style="text-decoration: none; color: inherit;">
            <img src="Images/about me.png" alt="About me magnet">
            <p>About me!</p>
        </a>
    </div>

    <div class="phone-box" onmouseenter="playDing()">
        <a href="socials.html" style="text-decoration: none; color: inherit;">
        <img src="Images/socials.png" alt="Socials magnet">
        <p>Socials</p> 
    </a>
</div>

        <div class="fridge-handle2"></div>
    </div> <div class="line1"></div>
    <div class="line2"></div>
    <div class="pink-paku"></div>

  <div class="contact-board">
        <p class="contact-title">Contact:</p>
        <img src="Images/mail.png" alt="Mail" class="Contact-Icon" 
             onmouseenter="playDing(); showTooltip()" 
             onmouseleave="hideTooltip()"
             onclick="copyEmailAddress()">
    </div>

    <div class="kitchen-floor-space"></div>

    <div class="email-cloud-tooltip" id="email-tooltip">Copy email!</div>

    </div> <audio id="magnet-sound" src="audio/ding.wav"></audio>

 <script>
        function playDing() {
            var sound = document.getElementById("magnet-sound");
            sound.currentTime = 0; 
            sound.play();          
        }

        function copyEmailAddress() {
            var emailText = "khaira.zalfa25@gmail.com";
            navigator.clipboard.writeText(emailText).then(function() {
                var tooltip = document.getElementById("email-tooltip");
                tooltip.innerText = "Copied! ✨"; 
                setTimeout(function() {
                    tooltip.innerText = "Copy email!";
                }, 2000);
            });
        }

        function showTooltip() {
            document.getElementById("email-tooltip").classList.add("show");
        }

        function hideTooltip() {
            document.getElementById("email-tooltip").classList.remove("show");
        }
    </script>
    
</body>
</html>
